<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A productivity dashboard with quotes, habits, checklist, and customization."
    />
    <meta name="author" content="Sterling Steele" />
    <title>WDD330 Final Project | Productivity Dashboard</title>
    <script src="./scripts/app.mjs" type="module"></script>
    <link rel="icon" href="./images/favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="styles/main.css" />
  </head>
  <body>
    <header>
      <h1>Productivity Dashboard</h1>
    </header>
    <main>
      <div class="background-image">
        <div class="background-overlay"></div>
      </div>

      <div class="dashboard">
        <div class="left-column">
          <section id="quote">
            <p class="quote-text"></p>
            <p class="quote-author"></p>
          </section>

          <!-- <section id="background"></section> -->

          <section id="time">
            <p class="time-display"></p>
            <p class="date-display"></p>

            <div class="countdown-panel">
              <input type="datetime-local" id="deadline-input" />
              <button id="set-deadline">Set Deadline</button>
              <p id="countdown"></p>
            </div>
          </section>
        </div>

        <div class="right-column">
          <section id="habits">
            <h2>Habits</h2>
            <ul id="habit-list"></ul>
            <button id="add-habit-btn">Add Habit</button>
          </section>

          <section id="checklist">
            <h2>Daily Checklist</h2>
            <ul id="checklist-items"></ul>
            <button id="add-task-btn">Add Task</button>
          </section>
        </div>
      </div>

      
      </section>
    </main>
    <footer>
      <section>
        <h2>Settings</h2>
        <div id="settings">
          <div id="theme-toggle"></div>
          <div id="color-options"></div>
          <div id="background-category"></div>
        </div>
      </section>
    </footer>
  </body>
</html>
